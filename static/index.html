<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音乐标签刮削</title>
    <link rel="stylesheet" href="/api/v1/plugin/musictag/static/css/fonts.css">
    <link rel="stylesheet" href="/api/v1/plugin/musictag/static/css/style.css">
</head>
<body>

<!-- AppBar -->
<header class="app-bar">
    <h1>音乐标签刮削</h1>
</header>

<div class="container">
    <!-- 卡片1: 歌单选择 -->
    <div class="card">
        <div class="card-header">
            <span class="material-symbols-outlined">queue_music</span>
            选择歌单
        </div>
        <div class="toolbar">
            <button id="loadPlaylists" class="btn-filled">
                <span class="material-symbols-outlined">refresh</span>
                加载歌单
            </button>
            <button id="plSelectAllBtn" class="btn-text" style="display:none">全选</button>
            <button id="plDeselectAllBtn" class="btn-text" style="display:none">取消全选</button>
            <span id="plSelectedCount" class="chip" style="display:none">已选 0 个</span>
        </div>
        <div id="playlistContainer" class="playlist-grid"></div>
    </div>

    <!-- 卡片2: 歌曲列表 -->
    <div class="card" id="songsCard" style="display:none">
        <div class="card-header">
            <span class="material-symbols-outlined">music_note</span>
            歌曲列表
            <span id="songTotalCount" class="chip" style="margin-left:auto;display:none">0 首</span>
        </div>
        <!-- 搜索框 -->
        <div class="search-bar">
            <span class="material-symbols-outlined">search</span>
            <input type="text" id="searchInput" placeholder="搜索歌曲标题、艺术家、专辑...">
        </div>
        <!-- 过滤标签 -->
        <div class="filter-tabs">
            <button class="filter-tab active" data-filter="all">全部</button>
            <button class="filter-tab" data-filter="pending">未刮削</button>
            <button class="filter-tab" data-filter="scraped">已刮削</button>
            <button class="filter-tab" data-filter="failed">失败</button>
        </div>
        <!-- 歌曲类型筛选 -->
        <div class="filter-tabs type-filter-tabs">
            <button class="filter-tab active" data-type-filter="all">全部</button>
            <button class="filter-tab" data-type-filter="local">本地歌曲</button>
            <button class="filter-tab" data-type-filter="remote">网络歌曲</button>
        </div>
        <!-- 歌曲操作栏 -->
        <div class="song-toolbar">
            <button id="songSelectAllBtn" class="btn-text">全选当前</button>
            <button id="songDeselectAllBtn" class="btn-text">取消全选</button>
            <span class="spacer"></span>
            <span id="songSelectedCount" class="chip" style="display:none">已选 0 首</span>
        </div>
        <!-- 歌曲列表 -->
        <div id="songListContainer" class="song-list"></div>
        <div id="songCountInfo" class="song-count"></div>
    </div>

    <!-- 卡片3: 操作控制 -->
    <div class="card" id="controlsCard" style="display:none">
        <div class="toolbar" style="justify-content:center;border-bottom:none">
            <button id="startBtn" class="btn-filled" disabled>
                <span class="material-symbols-outlined">auto_fix_high</span>
                开始刮削
            </button>
            <button id="stopBtn" class="btn-filled danger" style="display:none">
                <span class="material-symbols-outlined">stop</span>
                停止刮削
            </button>
            <button id="clearRecordsBtn" class="btn-outlined" style="display:none">
                <span class="material-symbols-outlined">delete_sweep</span>
                清除刮削记录
            </button>
        </div>
    </div>

    <!-- 卡片4: 进度 -->
    <div class="card" id="progressCard" style="display:none">
        <div class="card-header">
            <span class="material-symbols-outlined">hourglass_top</span>
            刮削进度
        </div>
        <div style="padding:16px 20px">
            <div class="progress-linear">
                <div class="progress-linear-fill" id="progressFill" style="width:0%"></div>
            </div>
            <div class="progress-text" id="progressText">准备中...</div>
            <div class="progress-detail" id="progressDetail"></div>
        </div>
    </div>

    <!-- 卡片5: 结果 -->
    <div class="card" id="resultsCard" style="display:none">
        <div class="card-header">
            <span class="material-symbols-outlined">assessment</span>
            刮削结果
        </div>
        <div style="padding:16px 20px">
            <div class="stats-row">
                <div class="stat-card total">
                    <div class="stat-number" id="statTotal">0</div>
                    <div class="stat-label">总计</div>
                </div>
                <div class="stat-card success">
                    <div class="stat-number" id="statSuccess">0</div>
                    <div class="stat-label">成功</div>
                </div>
                <div class="stat-card error">
                    <div class="stat-number" id="statFailed">0</div>
                    <div class="stat-label">失败</div>
                </div>
            </div>
            <div id="failedSection" style="display:none">
                <div class="toolbar" style="background:transparent;border-bottom:none;padding:0 0 8px">
                    <span style="font-weight:500;flex:1">失败歌曲</span>
                    <button id="retryBtn" class="btn-outlined">
                        <span class="material-symbols-outlined">refresh</span>
                        重新刮削失败歌曲
                    </button>
                </div>
                <div id="failedList" class="failed-list"></div>
            </div>
        </div>
    </div>
</div>

<!-- Snackbar -->
<div id="snackbar" class="snackbar"></div>

<script src="/api/v1/plugin/musictag/static/js/app.js"></script>
</body>
</html>
